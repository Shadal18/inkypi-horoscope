{% extends "plugin.html" %} {% block content %}
<div class="horoscope-canvas">
  <div class="hero-band">
    <div class="hero-left">
      <div class="sign-badge">{{ zodiac_symbol }}</div>
      <div class="hero-copy">
        <div class="eyebrow">Daily Horoscope</div>
        <div class="sign-name">{{ zodiac }}</div>
      </div>
    </div>

    <div class="date-chip">{{ date }}</div>
  </div>

  <div class="reading-band">
    <div class="reading-inner">
      {% for line in horoscope_lines %}
      <div class="reading-line">{{ line }}</div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
