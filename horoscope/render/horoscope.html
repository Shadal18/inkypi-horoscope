{% extends "plugin.html" %} {% block content %}
<div class="horoscope-screen">
  <div class="topbar">
    <div class="sign-group">
      <div class="sign-symbol">{{ zodiac_symbol }}</div>
      <div>
        <div class="sign-label">Daily Horoscope</div>
        <div class="sign-name">{{ zodiac }}</div>
      </div>
    </div>

    <div class="date-badge">{{ date }}</div>
  </div>

  <div class="horoscope-card">
    <div class="card-accent"></div>

    <div class="horoscope-text">
      {% for line in horoscope_lines %}
      <div class="horoscope-line">{{ line }}</div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
