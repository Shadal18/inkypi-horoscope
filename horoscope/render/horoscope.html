{% extends "plugin.html" %} {% block content %}
<div class="screen">
  <div class="header">
    <div class="sign-wrap">
      <div class="sign-icon">{{ zodiac_symbol }}</div>
      <div class="sign-meta">
        <div class="eyebrow">Daily Horoscope</div>
        <div class="sign-name">{{ zodiac }}</div>
      </div>
    </div>

    <div class="date-pill">{{ date }}</div>
  </div>

  <div class="message-card">
    <div class="message-inner">
      {% for line in horoscope_lines %}
      <div class="message-line">{{ line }}</div>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
