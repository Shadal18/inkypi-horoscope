<div class="form-group">
  <label for="zodiac" class="form-label">Zodiac Sign</label>
  <select id="zodiac" name="zodiac" class="form-input" required>
    <option value="aries">Aries</option>
    <option value="taurus">Taurus</option>
    <option value="gemini">Gemini</option>
    <option value="cancer">Cancer</option>
    <option value="leo">Leo</option>
    <option value="virgo">Virgo</option>
    <option value="libra">Libra</option>
    <option value="scorpio">Scorpio</option>
    <option value="sagittarius">Sagittarius</option>
    <option value="capricorn">Capricorn</option>
    <option value="aquarius">Aquarius</option>
    <option value="pisces">Pisces</option>
  </select>
  <small> Select the zodiac sign to display. The Horoscope API requires a zodiac parameter for each request. </small>
</div>

<hr style="border: 0; border-top: 1px solid rgba(0, 0, 0, 0.12); margin: 24px 0 18px" />

<div class="form-group" style="margin-bottom: 20px">
  <div
    style="
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #555;
      margin-bottom: 10px;
    "
  >
    Plugin Repository
  </div>

  <div style="background: #f8f9fa; border: 1px solid #dcdfe3; border-radius: 10px; padding: 14px 16px">
    <a
      href="https://github.com/shadal18/inkypi-horoscope"
      target="_blank"
      rel="noopener noreferrer"
      style="
        color: #0d6efd;
        text-decoration: none;
        font-weight: 600;
        font-size: 1rem;
        word-break: break-word;
        display: inline-block;
        margin-bottom: 6px;
      "
    >
      github.com/shadal18/inkypi-horoscope
    </a>

    <div style="font-size: 0.9rem; color: #666">Setup help, updates, release notes, and source code.</div>
  </div>
</div>

<style>
  .floatingchat-container-wrap,
  .floating-chat-kofi-popup-iframe {
    left: unset !important;
    right: 16px !important;
  }

  .floatingchat-container-wrap {
    bottom: 14px !important;
  }

  .floating-chat-kofi-popup-iframe {
    bottom: 76px !important;
  }
</style>

<script src="https://storage.ko-fi.com/cdn/scripts/overlay-widget.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const zodiacInput = document.getElementById("zodiac")

    if (typeof loadPluginSettings !== "undefined" && loadPluginSettings) {
      if (zodiacInput) zodiacInput.value = pluginSettings.zodiac || "aries"
    } else {
      if (zodiacInput) zodiacInput.value = "aries"
    }

    if (typeof kofiWidgetOverlay !== "undefined") {
      kofiWidgetOverlay.draw("shadal", {
        type: "floating-chat",
        "floating-chat.donateButton.text": "I ❤️ Coffee",
        "floating-chat.donateButton.background-color": "#00b9fe",
        "floating-chat.donateButton.text-color": "#fff",
      })
    }
  })
</script>
